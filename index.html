<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pet Inventory Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin: 20px 0; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
    button { padding: 10px 14px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <h1>Pet Inventory Dashboard</h1>
  <button id="runBtn">Load Data</button>
  <div id="output"></div>

  <script src="sql.js"></script>
  <script>
    async function init() {
      const SQL = await initSqlJs({
        locateFile: file => `./${file}`
      });

      const db = new SQL.Database();

      const response = await fetch("pets.sql");
      const sqlText = await response.text();

      sqlText
        .split(";")
        .map(s => s.trim())
        .filter(Boolean)
        .forEach(stmt => {
          try {
            db.run(stmt + ";");
          } catch (e) {
            console.error(e);
          }
        });

      const result = db.exec(`
        SELECT Pet, Rarity, Age
        FROM Inventory
        ORDER BY Pet
        LIMIT 10;
      `);

      const output = document.getElementById("output");
      if (!result.length) {
        output.innerHTML = "<p>No results.</p>";
        return;
      }

      const cols = result[0].columns;
      const vals = result[0].values;

      let html = "<table><tr>" + cols.map(c => `<th>${c}</th>`).join("") + "</tr>";
      vals.forEach(row => {
        html += "<tr>" + row.map(cell => `<td>${cell}</td>`).join("") + "</tr>";
      });
      html += "</table>";

      output.innerHTML = html;
    }

    document.getElementById("runBtn").addEventListener("click", init);
  </script>
</body>
</html>
